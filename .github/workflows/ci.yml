name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: "1.11"
      - uses: julia-actions/cache@v2
      - name: Instantiate and test
        run: julia --project=. -e 'using Pkg; Pkg.instantiate(); Pkg.test()'

  week05-evidence:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: "1.11"
      - uses: julia-actions/cache@v2
      - name: Instantiate
        run: julia --project=. -e 'using Pkg; Pkg.instantiate()'
      - name: Run Week 05 end-to-end example
        run: julia --project=. examples/week05_chinese_pipeline.jl
      - name: Run Week 05 three-seed CPU comparison
        env:
          LIFEAI_WEEK05_TRAIN_STEPS: "8"
          LIFEAI_WEEK05_TOKENIZER_REPETITIONS: "10"
        run: julia --project=. examples/benchmark_week05_tokenizers.jl benchmark_results/week05-ci
      - uses: actions/upload-artifact@v4
        with:
          name: week05-evidence
          path: benchmark_results/week05-ci

  week05-xla-smoke:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: "1.11"
      - uses: julia-actions/cache@v2
      - name: Instantiate
        run: julia --project=. -e 'using Pkg; Pkg.instantiate()'
      - name: Run Week 05 XLA CPU smoke
        run: julia --project=. test/test_week05_xla.jl
